<div class="modal-overlay" (click)="onCancel()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-icon">
          <app-icon name="plus" [size]="18" [sw]="2.5" />
        </div>
        <h3>{{ editCard() ? 'Edit Card' : 'Add New Card' }}</h3>
      </div>
      <button class="close-btn" (click)="onCancel()" title="Close">
        <app-icon name="x" [size]="16" [sw]="2.5" />
      </button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>Title <span class="required">*</span></label>
        <input
          type="text"
          class="form-input"
          [class.input-error]="titleError()"
          placeholder="Enter task title..."
          [value]="form().title"
          (input)="updateField('title', $event)"
          autofocus
        />
        @if (titleError()) {
          <p class="field-error">Title is required</p>
        }
      </div>

      <div class="form-group">
        <label>Description <span class="required">*</span></label>
        <textarea
          class="form-input"
          [class.input-error]="descError()"
          placeholder="Enter a short description..."
          [value]="form().description"
          (input)="updateField('description', $event)"
          rows="3"
        ></textarea>
        @if (descError()) {
          <p class="field-error">Description is required</p>
        }
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select
            class="form-input"
            [value]="form().category"
            (change)="updateField('category', $event)"
          >
            @for (cat of categories; track cat) {
              <option [value]="cat">{{ cat }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label>Priority</label>
          <select
            class="form-input"
            [value]="form().priority"
            (change)="updateField('priority', $event)"
          >
            <option value="high">🔴 High</option>
            <option value="medium">🟡 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>
          Cover Image URL
          <span class="optional">(optional)</span>
        </label>
        <input
          type="url"
          class="form-input"
          placeholder="https://..."
          [value]="form().image"
          (input)="updateField('image', $event)"
        />
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button class="btn-save" (click)="onSave()">
        {{ editCard() ? 'Save Changes' : 'Add Card' }}
      </button>
    </div>
  </div>
</div>
