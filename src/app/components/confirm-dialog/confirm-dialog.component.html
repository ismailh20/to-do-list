<div class="overlay" (click)="cancelled.emit()" (mousedown)="$event.stopPropagation()" (touchstart)="$event.stopPropagation()">
  <div class="dialog" (click)="$event.stopPropagation()">
    <div class="dialog-icon">
      <app-icon name="warning" [size]="22" [sw]="2.5" />
    </div>

    <h3 class="dialog-title">{{ title() }}</h3>
    <p class="dialog-message">{{ message() }}</p>

    <div class="dialog-actions">
      <button class="btn-cancel" (click)="cancelled.emit()">Cancel</button>
      <button class="btn-confirm" (click)="confirmed.emit()">{{ confirmLabel() }}</button>
    </div>
  </div>
</div>
